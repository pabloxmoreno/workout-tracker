<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bezpieczny Tracker Ćwiczeń</title>
    <meta name="description" content="Aplikacja do zarządzania treningami.">
    <meta name="theme-color" content="#2563eb">
    
    <!-- Link do manifestu PWA -->
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tracker Ćwiczeń</h1>
            <p class="subtitle">Zarządzaj swoimi treningami bezpiecznie</p>
        </header>

        <main>
            <!-- Formularz dodawania -->
            <section class="card form-section">
                <h2>Dodaj nowe ćwiczenie</h2>
                <form id="exercise-form">
                    <div class="form-group">
                        <label for="name">Nazwa ćwiczenia:</label>
                        <input type="text" id="name" name="name" required minlength="3" maxlength="50" autocomplete="off">
                        <span class="error-message" id="name-error"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="sets">Serie:</label>
                        <input type="number" id="sets" name="sets" min="1" max="20" value="3" required>
                    </div>

                    <div class="form-group">
                        <label for="reps">Powtórzenia:</label>
                        <input type="number" id="reps" name="reps" min="1" max="100" value="10" required>
                    </div>

                    <button type="submit" class="btn-primary">Dodaj ćwiczenie</button>
                </form>
            </section>

            <!-- Lista ćwiczeń -->
            <section class="card list-section">
                <div class="list-header">
                    <h2>Twoje ćwiczenia</h2>
                    <input type="text" id="search-input" placeholder="Szukaj ćwiczenia..." aria-label="Szukaj">
                </div>
                <ul id="exercise-list" class="exercise-list">
                    <!-- Elementy będą dodawane dynamicznie przez JS -->
                </ul>
                <p id="empty-state" class="empty-state">Brak ćwiczeń. Dodaj pierwsze!</p>
            </section>
        </main>

        <footer>
            <p>&copy; 2023 Bezpieczny Tracker. Dane przechowywane lokalnie.</p>
        </footer>
    </div>

    <!-- Ładowanie modułów w odpowiedniej kolejności -->
    <script src="js/config.js" defer></script>
    <script src="js/utils.js" defer></script>
    <script src="js/ui.js" defer></script>
    <script src="js/app.js" defer></script>

    <!-- Rejestracja Service Workera -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('SW zarejestrowany pomyślnie:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Rejestracja SW nieudana:', error);
                    });
            });
        }
    </script>
</body>
</html>
